
<div class="max-w-md mx-auto my-3 font-sans text-slate-900">
    <ul class="space-y-2">
        @for (name of showNames()(); track $index) {
            <li class="flex items-center justify-between gap-3 p-3 bg-white border border-slate-100 rounded-lg shadow-sm hover:shadow-md transition-transform duration-150 transform hover:-translate-y-1">
                <div class="flex items-center gap-3">
                    <span class="w-9 h-9 flex items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 text-white font-semibold text-sm">{{name.charAt(0).toUpperCase()}}</span>
                    <span class="text-sm">{{name}}</span>
                </div>
                <div class="flex items-center">
                    <app-edit-name [name]="name"></app-edit-name>
                    <app-remove-name [name]="name"></app-remove-name>
                </div>
            </li>
        }
    </ul>
    @if(!showNames()().length) {
        <div class="mt-2 text-center text-sm text-slate-500">No names available</div>
    }
</div>
